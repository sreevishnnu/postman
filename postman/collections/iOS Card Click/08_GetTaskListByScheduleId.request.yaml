$kind: http-request
name: 08 - GetTaskListByScheduleId
url: "{{base_url}}/TaskManager.svc/GetTaskListByScheduleId?clientId={{clientId}}&pageIndex={{tasklist_pageIndex}}&filterCondition=&recordCount={{tasklist_recordCount}}&scheduleId={{scheduleID}}&verticalId={{verticalId}}&languageId={{languageId}}&pageSize=50&attFamily=9&userId={{userId}}"
method: GET
headers:
  Authorization: "{{token}}"
order: 1772600000008
queryParams:
  clientId: "{{clientId}}"
  pageIndex: "{{tasklist_pageIndex}}"
  filterCondition: ""
  recordCount: "{{tasklist_recordCount}}"
  scheduleId: "{{scheduleID}}"
  verticalId: "{{verticalId}}"
  languageId: "{{languageId}}"
  pageSize: "50"
  attFamily: "9"
  userId: "{{userId}}"
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      // On first call (pageIndex not set or 0), reset all pagination state
      var pageIndex = parseInt(pm.environment.get("tasklist_pageIndex") || "0");
      if (isNaN(pageIndex) || pageIndex === 0) {
          pm.environment.set("t_GetTaskListByScheduleId_start", Date.now());
          pm.environment.set("tasklist_pageIndex", "0");
          pm.environment.set("tasklist_recordCount", "0");
          pm.environment.set("tasklist_accumulated", "[]");
          console.log("[GetTaskListByScheduleId] Starting — offset=0, pageSize=50, scheduleId=" + pm.environment.get("scheduleID"));
      } else {
          console.log("[GetTaskListByScheduleId] Fetching pageIndex=" + pageIndex);
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetTaskListByScheduleId_start"));
      var pageSize = 50;

      var jsonData = pm.response.json();
      var items = jsonData.GetTaskListByScheduleIdResult || [];

      // Read recordCount from response (only present on first call when recordCount param=0)
      var totalRecords = parseInt(pm.environment.get("tasklist_recordCount") || "0");
      if (jsonData.recordCount && jsonData.recordCount > 0) {
          totalRecords = jsonData.recordCount;
          pm.environment.set("tasklist_recordCount", String(totalRecords));
      }

      // Fallback: if recordCount still unknown but page was full, assume more pages exist
      if (totalRecords === 0 && items.length === pageSize) {
          totalRecords = 0;
          pm.environment.set("tasklist_recordCount", "0");
          console.log("[GetTaskListByScheduleId] recordCount missing — assuming more pages.");
      }

      console.log("[GetTaskListByScheduleId] pageIndex=" + pm.environment.get("tasklist_pageIndex") + " returned " + items.length + " items. totalRecords=" + totalRecords);

      // Accumulate taskIds from this page into the running list
      var accumulated = [];
      try { accumulated = JSON.parse(pm.environment.get("tasklist_accumulated") || "[]"); } catch(e) {}

      items.forEach(function(item) {
          if (item.TaskData) {
              try {
                  var taskList = JSON.parse(item.TaskData);
                  taskList.forEach(function(t) {
                      if (t.ID && accumulated.indexOf(t.ID) === -1) { 
                          accumulated.push(t.ID); 
                      }
                  });
              } catch(e) {
                  console.error("[GetTaskListByScheduleId] Error parsing TaskData: " + e.message);
              }
          }
      });
      pm.environment.set("tasklist_accumulated", JSON.stringify(accumulated));

      var currentOffset = parseInt(pm.environment.get("tasklist_pageIndex") || "0");
      var fetchedSoFar = currentOffset + items.length;
      var hasMore = items.length === pageSize && fetchedSoFar < totalRecords;

      if (hasMore) {
          // Loop back to fetch next page starting at the next offset (50, 100, etc.)
          pm.environment.set("tasklist_pageIndex", String(currentOffset + pageSize));
          console.log("[GetTaskListByScheduleId] More pages — looping to next offset=" + (currentOffset + pageSize));
          pm.execution.setNextRequest("08 - GetTaskListByScheduleId");
      } else {
          // All pages done — save final result and clean up
          pm.environment.set("checklist_taskIds", pm.environment.get("tasklist_accumulated"));
          pm.environment.set("t_GetTaskListByScheduleId_ms", Date.now() - overallStart);
          pm.environment.set("tasklist_pageIndex", "0");
          pm.environment.set("tasklist_recordCount", "0");
          pm.environment.unset("tasklist_accumulated");

          console.log("[GetTaskListByScheduleId] All pages done. Total taskIds: " + accumulated.length);

          if (accumulated.length > 0) {
              pm.environment.set("current_taskId", String(accumulated[0]));
              // Natural Runner order proceeds to 09
          } else {
              var imageIds = [];
              try { imageIds = JSON.parse(pm.environment.get("checklist_imageIds") || "[]"); } catch(e) {}
              if (imageIds.length > 0) {
                  pm.execution.setNextRequest("10 - GetImageData");
              } else {
                  pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
              }
          }
      }

      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
