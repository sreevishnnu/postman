$kind: http-request
name: 08 - GetTaskListByScheduleId
url: "{{base_url}}/TaskManager.svc/GetTaskListByScheduleId?clientId={{clientId}\
  }&pageIndex=0&filterCondition=&recordCount=0&scheduleId={{scheduleID}}&vertic\
  alId={{verticalId}}&languageId={{languageId}}&pageSize=50&attFamily=9&userId=\
  {{userId}}"
method: GET
headers:
  Authorization: "{{token}}"
order: 1772600000008
queryParams:
  clientId: "{{clientId}}"
  pageIndex: "0"
  filterCondition: ""
  recordCount: "0"
  scheduleId: "{{scheduleID}}"
  verticalId: "{{verticalId}}"
  languageId: "{{languageId}}"
  pageSize: "50"
  attFamily: "9"
  userId: "{{userId}}"
scripts:
  - type: beforeRequest
    code: >-
      pm.environment.set("t_GetTaskListByScheduleId_start", Date.now());

      console.log("[GetTaskListByScheduleId] Requesting for scheduleId: " +
      pm.environment.get("scheduleId"));
    language: text/javascript
  - type: afterResponse
    code: >-
      var overallStart =
      parseInt(pm.environment.get("t_GetTaskListByScheduleId_start"));

      var jsonData = pm.response.json();

      var results = jsonData.GetTaskListByScheduleIdResult || [];


      console.log("[GetTaskListByScheduleId] Received " + results.length + "
      result objects.");


      var taskIds = [];

      results.forEach(function(item) {
          if (item.TaskData) {
              try {
                  var taskList = JSON.parse(item.TaskData);
                  taskList.forEach(function(t) {
                      if (t.ID) {
                          taskIds.push(t.ID);
                      }
                  });
              } catch(e) {
                  console.error("[GetTaskListByScheduleId] Error parsing TaskData: " + e.message);
              }
          }
      });


      pm.environment.set("checklist_taskIds", JSON.stringify(taskIds));

      pm.environment.set("t_GetTaskListByScheduleId_ms", Date.now() -
      overallStart);

      console.log("[GetTaskListByScheduleId] Extracted IDs: " +
      JSON.stringify(taskIds));


      if (taskIds.length > 0) {
          pm.environment.set("current_taskId", String(taskIds[0]));
          pm.execution.setNextRequest("09 - GetAllSubTasksListPagingFO");
      } else {
          var imageIds = JSON.parse(pm.environment.get("checklist_imageIds") || "[]");
          if (imageIds.length > 0) {
              pm.execution.setNextRequest("10 - GetImageData");
          } else {
              pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
          }
      }


      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
