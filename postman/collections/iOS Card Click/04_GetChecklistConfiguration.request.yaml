$kind: http-request
name: 04 - GetChecklistConfiguration
url: "{{base_url}}/ProInspectorJson.svc/GetChecklistConfiguration"
method: GET
headers:
  Authorization: "{{token}}"
queryParams:
  checklistId: "{{checklistId}}"
  pageSize: "50"
  startIndex: "0"
  recordCount: "0"
settings:
  disabledSystemHeaders: []
order: 1772600000004
scripts:
  - type: beforeRequest
    code: >-
      // Always start fresh from page 0

      pm.environment.set("t_GetChecklistConfiguration_start", Date.now());

      console.log("[GetChecklistConfiguration] Starting — pageIndex=0,
      pageSize=50, checklistId=" + pm.environment.get("checklistId"));
    language: text/javascript
  - type: afterResponse
    code: >-
      var overallStart =
      parseInt(pm.environment.get("t_GetChecklistConfiguration_start"));

      var baseUrl  = pm.environment.get("base_url");

      var token    = pm.environment.get("token");

      var checklistId = pm.environment.get("checklistId");

      var pageSize = 50;


      var jsonData = pm.response.json();

      var firstPage = jsonData.GetChecklistConfigurationResult || [];


      // Read total recordCount — check root and first item

      var totalRecords = jsonData.RecordCount
          || jsonData.recordCount
          || jsonData.TotalRecordCount
          || (firstPage.length > 0 && (firstPage[0].RecordCount || firstPage[0].recordCount || firstPage[0].TotalCount))
          || 0;
      console.log("[GetChecklistConfiguration] Page 0 returned " +
      firstPage.length + " items. Total recordCount=" + totalRecords);


      // Accumulate ids from first page

      var hasFormula = false;
      var hasInternalTable = false;
      var internalTableIds = [];
      var seenUrls = {};
      var activeDownloads = 0;
      var isAllPagesDone = false;

      function checkReadyToChain() {
          if (!isAllPagesDone || activeDownloads > 0) return;
          completeAll();
      }

      function downloadImage(url) {
          if (!url || url.trim() === "" || seenUrls[url]) return;
          seenUrls[url] = true;
          activeDownloads++;
          
          var imgStart = Date.now();
          pm.sendRequest({
              url: url,
              method: "GET"
          }, function(err, res) {
              var imgElapsed = Date.now() - imgStart;
              if (err) {
                  console.error("[GetChecklistConfiguration] Image ERROR: " + url + " | " + err);
              } else {
                  console.log("[GetChecklistConfiguration] Image Downloaded: " + url + " | " + res.code + " | " + (imgElapsed / 1000).toFixed(2) + " s");
              }
              activeDownloads--;
              checkReadyToChain();
          });
      }


      function processPage(items) {
          for (var i = 0; i < items.length; i++) {
              var item = items[i];
              if (item.dbID_PI_FormulaHeader !== null && item.dbID_PI_FormulaHeader !== undefined) {
                  hasFormula = true;
              }
              if (item.dbFreeTextType === "IN" && item.dbID_InternalTable != null) {
                  hasInternalTable = true;
                  var idStr = String(item.dbID_InternalTable);
                  if (internalTableIds.indexOf(idStr) === -1) {
                      internalTableIds.push(idStr);
                  }
              }
              // Immediate download in each request
              if (item.dbAlert_image_Url) {
                  downloadImage(item.dbAlert_image_Url);
              }
          }
          console.log("[GetChecklistConfiguration] Processed page. activeDownloads=" + activeDownloads);
      }


      processPage(firstPage);


      // Calculate remaining pages needed

      var totalPages = Math.ceil(totalRecords / pageSize);

      var remainingPages = totalPages - 1; // page 0 already fetched


      if (remainingPages <= 0) {
          isAllPagesDone = true;
          checkReadyToChain();
      } else {
          var completed = 0;
          for (var p = 1; p <= remainingPages; p++) {
              (function(pageIndex) {
                  var url = baseUrl + "/ProInspectorJson.svc/GetChecklistConfiguration"
                      + "?checklistId=" + checklistId
                      + "&pageSize=" + pageSize
                      + "&startIndex=" + pageIndex
                      + "&recordCount=" + totalRecords;

                  pm.sendRequest({
                      url: url,
                      method: "GET",
                      header: { "Authorization": token }
                  }, function(err, res) {
                      var pageElapsed = Date.now() - overallStart;
                      if (!err) {
                          var data = res.json();
                          var items = data.GetChecklistConfigurationResult || [];
                          console.log("[GetChecklistConfiguration] Page " + pageIndex + " returned " + items.length + " items in " + (pageElapsed / 1000).toFixed(2) + " s");
                          processPage(items);
                      } else {
                          console.error("[GetChecklistConfiguration] Page " + pageIndex + " ERROR: " + err);
                      }
                      completed++;
                      if (completed === remainingPages) {
                          isAllPagesDone = true;
                          checkReadyToChain();
                      }
                  });
              })(p);
          }
      }


      function completeAll() {
          var elapsed = Date.now() - overallStart;
          pm.environment.set("t_GetChecklistConfiguration_ms", elapsed);

          pm.environment.set("checklist_hasFormula", hasFormula ? "true" : "false");
          pm.environment.set("checklist_hasInternalTable", hasInternalTable ? "true" : "false");
          pm.environment.set("checklist_parentIds", JSON.stringify(internalTableIds));
          if (internalTableIds.length > 0) {
              pm.environment.set("internalTable_parentId", String(internalTableIds[0]));
          }

          console.log("[GetChecklistConfiguration] COMPLETE. Pages Done, Images Done. Total time: " + (elapsed / 1000).toFixed(2) + " s");

          // Chaining for Runner
          if (hasFormula) {
              pm.execution.setNextRequest("05 - GetChecklistFormulaDetails");
          } else if (hasInternalTable) {
              pm.execution.setNextRequest("06 - GetAllInternalTablesByMasterID");
          } else {
              pm.execution.setNextRequest("07 - GetExecutionDetailsByScheduleID");
          }
      }


      pm.test("GetChecklistConfiguration - Status 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
