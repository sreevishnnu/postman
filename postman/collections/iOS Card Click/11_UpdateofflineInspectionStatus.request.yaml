$kind: http-request
name: "11 - UpdateofflineInspectionStatus"
url: "{{base_url}}/ProInspectorJson.svc/UpdateofflineInspectionStatus?userId={{userId}}&scheduleId={{scheduleID}}&isDownloaded=1"
method: GET
headers:
  Authorization: "{{token}}"
settings:
  disabledSystemHeaders: []
order: 1772600000011
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_UpdateofflineStatus_start", Date.now());
      console.log("[UpdateofflineInspectionStatus] Request started at: " + new Date().toISOString());
      console.log("[UpdateofflineInspectionStatus] scheduleID: " + pm.environment.get("scheduleID"));
  - type: afterResponse
    language: text/javascript
    code: |-
      var startTime = pm.environment.get("t_UpdateofflineStatus_start");
      var elapsed = Date.now() - parseInt(startTime);

      pm.environment.set("t_UpdateofflineStatus_ms", elapsed);
      console.log("[UpdateofflineInspectionStatus] Completed in " + (elapsed / 1000).toFixed(2) + " s");

      pm.test("UpdateofflineInspectionStatus - Status 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("UpdateofflineInspectionStatus - Response time < 5000ms", function () {
          pm.expect(elapsed).to.be.below(5000);
      });

      // Final timing summary for full Card Click flow
      var keys = [
          { label: "03 GetSyncTablesbyTableCode",       env: "t_GetSyncTables_ms" },
          { label: "04 GetChecklistConfiguration",      env: "t_GetChecklistConfiguration_ms" },
          { label: "05 GetChecklistFormulaDetails",     env: "t_GetChecklistFormulaDetails_ms" },
          { label: "06 GetAllInternalTablesByMasterID", env: "t_GetAllInternalTables_ms" },
          { label: "07 GetExecutionDetailsByScheduleID",env: "t_GetExecutionDetails_ms" },
      { label: "08 GetTaskListByScheduleId",        env: "t_GetTaskListByScheduleId_ms" },
      { label: "09 GetAllSubTasksListPagingFO",     env: "t_GetAllSubTasks_ms" },
      { label: "10 GetImageData (images)",           env: "t_GetImageData_ms" },
      { label: "11 UpdateofflineInspectionStatus",  env: "t_UpdateofflineStatus_ms" }
      ];
      var lines = ["=== CARD CLICK - TIMING SUMMARY ==="];
      var total = 0;
      for (var i = 0; i < keys.length; i++) {
          var val = pm.environment.get(keys[i].env);
          if (val === "SKIPPED") {
              lines.push("  " + keys[i].label + ": SKIPPED");
          } else if (val) {
              var ms = parseInt(val);
              var s = (ms / 1000).toFixed(2);
              total += ms;
              lines.push("  " + keys[i].label + ": " + s + " s");
          } else {
              lines.push("  " + keys[i].label + ": (not recorded)");
          }
      }
      lines.push("------------------------------------");
      lines.push("  Total: " + (total / 1000).toFixed(2) + " s");
      lines.push("====================================");
      console.log(lines.join("\n"));
      
      // Force end collection run
      pm.execution.setNextRequest(null);
