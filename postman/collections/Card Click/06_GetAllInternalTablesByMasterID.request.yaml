$kind: http-request
name: "06 - GetAllInternalTablesByMasterID"
url: "{{base_url}}/ProInspectorJson.svc/GetAllInternalTablesByMasterID?clientId={{clientId}}&languageId={{languageId}}&verticalId={{verticalId}}&filterCondition=&pageSize=0&pageIndex=0&parentId={{internalTable_parentId}}&recordCount=0"
method: GET
headers:
  Authorization: "{{token}}"
settings:
  disabledSystemHeaders: []
order: 1772600000006
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      var hasInternalTable = pm.environment.get("checklist_hasInternalTable");
      if (hasInternalTable !== "true") {
          console.log("[GetAllInternalTablesByMasterID] SKIPPED - no internal table lookups.");
          pm.environment.set("t_GetAllInternalTables_ms", "SKIPPED");
          pm.environment.set("skip_internalTable", "true");
      } else {
          pm.environment.set("skip_internalTable", "false");
          pm.environment.set("t_GetAllInternalTables_start", Date.now());
          console.log("[GetAllInternalTablesByMasterID] Request started at: " + new Date().toISOString());
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.environment.get("skip_internalTable") === "true") {
          printTimingSummary();
          return;
      }

      var overallStart = parseInt(pm.environment.get("t_GetAllInternalTables_start"));

      // Fire additional parentId calls in parallel using pm.sendRequest
      var parentIds = JSON.parse(pm.environment.get("checklist_parentIds") || "[]");
      var baseUrl = pm.environment.get("base_url");
      var token   = pm.environment.get("token");

      // First parentId was sent as the main request
      var firstPid = parentIds[0];
      console.log("[GetAllInternalTablesByMasterID] parentId=" + firstPid + " => main request completed");

      var remaining = parentIds.slice(1);
      var pending   = remaining.length;

      if (pending === 0) {
          var elapsed = Date.now() - overallStart;
          pm.environment.set("t_GetAllInternalTables_ms", elapsed);
          console.log("[GetAllInternalTablesByMasterID] All parentId calls done. Total: " + (elapsed / 1000).toFixed(2) + " s");
          printTimingSummary();
          return;
      }

      for (var i = 0; i < remaining.length; i++) {
          (function(pid) {
              var reqUrl = baseUrl + "/ProInspectorJson.svc/GetAllInternalTablesByMasterID"
                  + "?clientId=" + pm.environment.get("clientId")
                  + "&languageId=" + pm.environment.get("languageId")
                  + "&verticalId=" + pm.environment.get("verticalId")
                  + "&filterCondition=&pageSize=0&pageIndex=0"
                  + "&parentId=" + pid + "&recordCount=0";

              var reqStart = Date.now();
              pm.sendRequest({
                  url: reqUrl,
                  method: "GET",
                  header: { "Authorization": token }
              }, function(err, res) {
                  var reqElapsed = Date.now() - reqStart;
                  var wallElapsed = Date.now() - overallStart;
                  if (err) {
                      console.error("[GetAllInternalTablesByMasterID] parentId=" + pid + " ERROR: " + err);
                  } else {
                      console.log("[GetAllInternalTablesByMasterID] parentId=" + pid + " => " + res.code + " | " + (reqElapsed / 1000).toFixed(2) + " s (wall: " + (wallElapsed / 1000).toFixed(2) + " s)");
                  }
                  pending--;
                  if (pending === 0) {
                      var totalElapsed = Date.now() - overallStart;
                      pm.environment.set("t_GetAllInternalTables_ms", totalElapsed);
                      console.log("[GetAllInternalTablesByMasterID] All parentId calls completed. Total wall time: " + (totalElapsed / 1000).toFixed(2) + " s");
                      printTimingSummary();
                  }
              });
          })(remaining[i]);
      }

      pm.test("GetAllInternalTablesByMasterID - Status 200", function () {
          pm.response.to.have.status(200);
      });

      function printTimingSummary() {
          var keys = [
              { label: "03 GetSyncTablesbyTableCode",    env: "t_GetSyncTables_ms" },
              { label: "04 GetChecklistConfiguration",   env: "t_GetChecklistConfiguration_ms" },
              { label: "05 GetChecklistFormulaDetails",  env: "t_GetChecklistFormulaDetails_ms" },
              { label: "06 GetAllInternalTablesByMasterID", env: "t_GetAllInternalTables_ms" }
          ];
          var lines = ["=== LISTING CLICK - TIMING SUMMARY ==="];
          var total = 0;
          for (var i = 0; i < keys.length; i++) {
              var val = pm.environment.get(keys[i].env);
              if (val === "SKIPPED") {
                  lines.push("  " + keys[i].label + ": SKIPPED");
              } else if (val) {
                  var ms = parseInt(val);
                  var s = (ms / 1000).toFixed(2);
                  total += ms;
                  lines.push("  " + keys[i].label + ": " + s + " s");
              } else {
                  lines.push("  " + keys[i].label + ": (not recorded)");
              }
          }
          lines.push("--------------------------------------");
          lines.push("  Total: " + (total / 1000).toFixed(2) + " s");
          lines.push("======================================");
          console.log(lines.join("\n"));
      }
