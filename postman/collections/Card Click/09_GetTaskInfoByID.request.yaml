$kind: http-request
name: "09 - GetTaskInfoByID"
url: "{{base_url}}/TaskManager.svc/GetTaskInfoByID?clientId={{clientId}}&languageId={{languageId}}&verticalId={{verticalId}}&attFamily={{attFamily}}&taskId={{task_info_taskId}}&executionDetailsID={{task_info_exeId}}&businessVerticalId={{businessVerticalId}}&userId={{userId}}&isIPAD=false"
method: GET
headers:
  Authorization: "{{token}}"
queryParams:
  clientId: "{{clientId}}"
  languageId: "{{languageId}}"
  verticalId: "{{verticalId}}"
  attFamily: "{{attFamily}}"
  taskId: "{{task_info_taskId}}"
  executionDetailsID: "{{task_info_exeId}}"
  businessVerticalId: "{{businessVerticalId}}"
  userId: "{{userId}}"
  isIPAD: "false"
settings:
  disabledSystemHeaders: []
order: 1772600000009
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      var payloads = JSON.parse(pm.environment.get("checklist_taskInfoPayloads") || "[]");
      if (payloads.length === 0) {
          console.log("[GetTaskInfoByID] SKIPPED - no tasks found in previous step.");
          pm.environment.set("t_GetTaskInfo_ms", "SKIPPED");
          pm.execution.skip();
      } else {
          pm.environment.set("t_GetTaskInfo_start", Date.now());
          console.log("[GetTaskInfoByID] Request started for " + payloads.length + " tasks at: " + new Date().toISOString());
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetTaskInfo_start"));

      // Fire additional task info calls in parallel
      var payloads = JSON.parse(pm.environment.get("checklist_taskInfoPayloads") || "[]");
      var baseUrl  = pm.environment.get("base_url");
      var token    = pm.environment.get("token");
      
      // Get env vars
      var clientId      = pm.environment.get("clientId");
      var languageId    = pm.environment.get("languageId");
      var verticalId    = pm.environment.get("verticalId");
      var attFamily     = pm.environment.get("attFamily");
      var bizVerticalId = pm.environment.get("businessVerticalId");
      var userId        = pm.environment.get("userId");

      // First payload was sent via the main request
      var first = payloads[0];
      console.log("[GetTaskInfoByID] taskId=" + first.taskId + " | exeId=" + first.exeId + " => main request completed");

      var remaining = payloads.slice(1);
      var pending   = remaining.length;

      if (pending === 0) {
          var elapsed = Date.now() - overallStart;
          pm.environment.set("t_GetTaskInfo_ms", elapsed);
          console.log("[GetTaskInfoByID] All task info calls completed in " + (elapsed / 1000).toFixed(2) + " s");
          return;
      }

      for (var i = 0; i < remaining.length; i++) {
          (function(p) {
              var reqUrl = baseUrl + "/TaskManager.svc/GetTaskInfoByID"
                  + "?clientId=" + clientId
                  + "&languageId=" + languageId
                  + "&verticalId=" + verticalId
                  + "&attFamily=" + attFamily
                  + "&taskId=" + p.taskId
                  + "&executionDetailsID=" + p.exeId
                  + "&businessVerticalId=" + bizVerticalId
                  + "&userId=" + userId
                  + "&isIPAD=false";

              var reqStart = Date.now();
              pm.sendRequest({
                  url: reqUrl,
                  method: "GET",
                  header: { "Authorization": token }
              }, function(err, res) {
                  var reqElapsed = Date.now() - reqStart;
                  var wallElapsed = Date.now() - overallStart;
                  if (err) {
                      console.error("[GetTaskInfoByID] taskId=" + p.taskId + " ERROR: " + err);
                  } else {
                      console.log("[GetTaskInfoByID] taskId=" + p.taskId + " => " + res.code + " | " + (reqElapsed / 1000).toFixed(2) + " s (wall: " + (wallElapsed / 1000).toFixed(2) + " s)");
                  }
                  pending--;
                  if (pending === 0) {
                      var totalElapsed = Date.now() - overallStart;
                      pm.environment.set("t_GetTaskInfo_ms", totalElapsed);
                      console.log("[GetTaskInfoByID] All task info calls completed in " + (totalElapsed / 1000).toFixed(2) + " s");
                  }
              });
          })(remaining[i]);
      }

      pm.test("GetTaskInfoByID - Status 200", function () {
          pm.response.to.have.status(200);
      });
