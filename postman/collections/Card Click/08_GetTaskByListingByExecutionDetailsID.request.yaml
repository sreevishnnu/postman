$kind: http-request
name: "08 - GetTaskByListingByExecutionDetailsID"
url: "{{base_url}}/ProInspectorJson.svc/GetTaskByListingByExecutionDetailsID?clientId={{clientId}}&userId={{userId}}&businessVerticalsId={{businessVerticalId}}&executionDetailsId={{task_exeId}}&verticalId={{verticalId}}&pageSize=100&pageIndex=0&recordCount=0"
method: GET
headers:
  Authorization: "{{token}}"
queryParams:
  clientId: "{{clientId}}"
  userId: "{{userId}}"
  businessVerticalsId: "{{businessVerticalId}}"
  executionDetailsId: "{{task_exeId}}"
  verticalId: "{{verticalId}}"
  pageSize: "100"
  pageIndex: "0"
  recordCount: "0"
settings:
  disabledSystemHeaders: []
order: 1772600000008
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_GetTaskByListing_start", Date.now());
      console.log("[GetTaskByListing] Request started at: " + new Date().toISOString());
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetTaskByListing_start"));
      var taskPayloads = [];

      function processTaskResponse(responseData, exeId) {
          try {
              var resultStr = responseData.GetTaskByListingByExecutionDetailsIDResult;
              if (resultStr) {
                  var tasks = JSON.parse(resultStr);
                  for (var j = 0; j < tasks.length; j++) {
                      taskPayloads.push({
                          taskId: tasks[j].hdn_TaskId,
                          exeId: exeId
                      });
                  }
              }
          } catch(e) {
              console.error("[GetTaskByListing] Error parsing tasks for exeId=" + exeId + ": " + e);
          }
      }

      // Process main request response
      processTaskResponse(pm.response.json(), pm.environment.get("task_exeId"));

      // Fire additional task calls in parallel using pm.sendRequest
      var rawExeIds = pm.environment.get("checklist_executionDetailIds");
      var exeIds = [];
      try {
          exeIds = JSON.parse(rawExeIds || "[]");
      } catch(e) { exeIds = []; }
      
      var baseUrl  = pm.environment.get("base_url");
      var token    = pm.environment.get("token");
      
      // Get env vars for params
      var clientId = pm.environment.get("clientId");
      var userId = pm.environment.get("userId");
      var bizVerticalId = pm.environment.get("businessVerticalId");
      var verticalId = pm.environment.get("verticalId");

      var remaining = exeIds.slice(1);
      var pending   = remaining.length;

      if (pending === 0) {
          finalize();
      } else {
          for (var i = 0; i < remaining.length; i++) {
              (function(eid) {
                  var reqUrl = baseUrl + "/ProInspectorJson.svc/GetTaskByListingByExecutionDetailsID"
                      + "?clientId=" + clientId
                      + "&userId=" + userId
                      + "&businessVerticalsId=" + bizVerticalId
                      + "&executionDetailsId=" + eid
                      + "&verticalId=" + verticalId
                      + "&pageSize=100&pageIndex=0&recordCount=0";

                  var reqStart = Date.now();
                  pm.sendRequest({
                      url: reqUrl,
                      method: "GET",
                      header: { "Authorization": token }
                  }, function(err, res) {
                      var reqElapsed = Date.now() - reqStart;
                      var wallElapsed = Date.now() - overallStart;
                      if (err) {
                          console.error("[GetTaskByListing] ID=" + eid + " ERROR: " + err);
                      } else {
                          console.log("[GetTaskByListing] ID=" + eid + " => " + res.code + " | " + (reqElapsed / 1000).toFixed(2) + " s (wall: " + (wallElapsed / 1000).toFixed(2) + " s)");
                          processTaskResponse(res.json(), eid);
                      }
                      pending--;
                      if (pending === 0) {
                          finalize();
                      }
                  });
              })(remaining[i]);
          }
      }

      function finalize() {
          var totalElapsed = Date.now() - overallStart;
          pm.environment.set("t_GetTaskByListing_ms", totalElapsed);
          pm.environment.set("checklist_taskInfoPayloads", JSON.stringify(taskPayloads));
          if (taskPayloads.length > 0) {
              pm.environment.set("task_info_taskId", String(taskPayloads[0].taskId));
              pm.environment.set("task_info_exeId",  String(taskPayloads[0].exeId));
          } else {
              pm.environment.set("task_info_taskId", "0");
              pm.environment.set("task_info_exeId",  "0");
              pm.environment.set("t_GetTaskInfo_ms", "SKIPPED");
          }
          console.log("[GetTaskByListing] All task calls completed in " + (totalElapsed / 1000).toFixed(2) + " s. Total tasks found: " + taskPayloads.length);

          // Chaining for Runner
          if (taskPayloads.length > 0) {
              postman.setNextRequest("09 - GetTaskInfoByID");
          } else {
              var rawImgs = pm.environment.get("checklist_imageIds");
              var hasImages = false;
              try {
                  var imgIds = JSON.parse(rawImgs || "[]");
                  hasImages = (imgIds.length > 0);
              } catch(e) { hasImages = false; }
              
              if (hasImages) {
                  postman.setNextRequest("10 - GetImageData");
              } else {
                  postman.setNextRequest("11 - UpdateofflineInspectionStatus");
              }
          }
      }

      pm.test("GetTaskByListing - Status 200", function () {
          pm.response.to.have.status(200);
      });
