$kind: http-request
name: "06 - GetAllInternalTablesByMasterID (Conditional)"
url: "{{base_url}}/ProInspectorJsonV1.svc/GetAllInternalTablesByMasterID"
method: GET
params:
  - name: token
    value: "{{token}}"
  - name: masterID
    value: "{{internalTableMasterID}}"
  - name: deviceTypeId
    value: "2"
  - name: licenseKey
    value: "{{licenseKey}}"
headers:
  - name: Authorization
    value: "{{token}}"
settings:
  disabledSystemHeaders: []
order: 1772600000006
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      var hasInternalTable = pm.environment.get("checklist_hasInternalTable");

      if (hasInternalTable !== "true") {
          // Skip this request — checklist has no internal table lookups
          console.log("[GetAllInternalTablesByMasterID] SKIPPED - Checklist has no internal table lookups.");
          pm.environment.set("t_GetAllInternalTables_ms", "SKIPPED");
          pm.environment.set("skip_internalTable", "true");
      } else {
          pm.environment.set("skip_internalTable", "false");
          pm.environment.set("t_GetAllInternalTables_start", Date.now());
          console.log("[GetAllInternalTablesByMasterID] Request started at: " + new Date().toISOString());
          console.log("[GetAllInternalTablesByMasterID] Using MasterID: " + pm.environment.get("internalTableMasterID"));
      }
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.environment.get("skip_internalTable") === "true") {
          console.log("[GetAllInternalTablesByMasterID] Response received but request was marked as skipped.");
          // Print timing summary anyway
          printTimingSummary();
          return;
      }

      var startTime = pm.environment.get("t_GetAllInternalTables_start");
      var elapsed = Date.now() - parseInt(startTime);

      pm.environment.set("t_GetAllInternalTables_ms", elapsed);
      console.log("[GetAllInternalTablesByMasterID] Completed in " + elapsed + " ms");

      // Test assertions
      pm.test("GetAllInternalTablesByMasterID - Status 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("GetAllInternalTablesByMasterID - Response time < 5000ms", function () {
          pm.expect(elapsed).to.be.below(5000);
      });

      // Print full timing summary after last request
      printTimingSummary();

      function printTimingSummary() {
          var summary = [];
          summary.push("=== INSPECTION LISTING - TIMING SUMMARY ===");

          var keys = [
              { label: "01 GetInspections",             env: "t_GetInspections_ms" },
              { label: "02 GetDashboardDetails",         env: "t_GetDashboardDetails_ms" },
              { label: "03 GetSyncTablesbyTableCode",    env: "t_GetSyncTables_ms" },
              { label: "04 GetChecklistConfiguration",  env: "t_GetChecklistConfiguration_ms" },
              { label: "05 GetChecklistFormulaDetails",  env: "t_GetChecklistFormulaDetails_ms" },
              { label: "06 GetAllInternalTablesByMasterID", env: "t_GetAllInternalTables_ms" }
          ];

          var grandTotal = 0;

          for (var i = 0; i < keys.length; i++) {
              var val = pm.environment.get(keys[i].env);
              if (val === "SKIPPED") {
                  summary.push("  " + keys[i].label + ": SKIPPED");
              } else if (val) {
                  var ms = parseInt(val);
                  grandTotal += ms;
                  summary.push("  " + keys[i].label + ": " + ms + " ms");
              } else {
                  summary.push("  " + keys[i].label + ": (not recorded)");
              }
          }

          summary.push("-------------------------------------------");
          summary.push("  Sequential Total (excl. parallel):  " + grandTotal + " ms");
          summary.push("  Note: Steps 01 & 02 run in parallel; total wall time is max(01, 02) + 03 + 04 + conditionals");
          summary.push("===========================================");

          console.log(summary.join("\n"));
      }
