$kind: http-request
name: "04 - GetChecklistConfiguration"
url: "{{base_url}}/ProInspectorJsonV1.svc/GetChecklistConfiguration"
method: GET
params:
  - name: token
    value: "{{token}}"
  - name: inspectionID
    value: "{{inspectionID}}"
  - name: deviceTypeId
    value: "2"
  - name: licenseKey
    value: "{{licenseKey}}"
headers:
  - name: Authorization
    value: "{{token}}"
settings:
  disabledSystemHeaders: []
order: 1772600000004
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_GetChecklistConfiguration_start", Date.now());
      console.log("[GetChecklistConfiguration] Request started at: " + new Date().toISOString());
      console.log("[GetChecklistConfiguration] Using InspectionID: " + pm.environment.get("inspectionID"));
  - type: afterResponse
    language: text/javascript
    code: |-
      var startTime = pm.environment.get("t_GetChecklistConfiguration_start");
      var elapsed = Date.now() - parseInt(startTime);

      pm.environment.set("t_GetChecklistConfiguration_ms", elapsed);
      console.log("[GetChecklistConfiguration] Completed in " + elapsed + " ms");

      var jsonData = pm.response.json();
      var result = jsonData.GetChecklistConfigurationResult;

      // Detect if checklist has formula fields
      var hasFormula = false;
      var hasInternalTable = false;

      if (result && result.length > 0) {
          for (var i = 0; i < result.length; i++) {
              var item = result[i];
              // Check for formula presence — adjust field name if needed
              if (item.HasFormula === true || item.HasFormula === 1 || item.FormulaID) {
                  hasFormula = true;
              }
              // Check for internal table lookup presence — adjust field name if needed
              if (item.HasInternalTable === true || item.HasInternalTable === 1 || item.InternalTableMasterID) {
                  hasInternalTable = true;
                  // Store MasterID for the internal table call
                  pm.environment.set("internalTableMasterID", item.InternalTableMasterID || pm.environment.get("masterID"));
              }
          }
      }

      pm.environment.set("checklist_hasFormula", hasFormula ? "true" : "false");
      pm.environment.set("checklist_hasInternalTable", hasInternalTable ? "true" : "false");

      console.log("[GetChecklistConfiguration] HasFormula: " + hasFormula + ", HasInternalTable: " + hasInternalTable);

      // Test assertions
      pm.test("GetChecklistConfiguration - Status 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("GetChecklistConfiguration - Response time < 5000ms", function () {
          pm.expect(elapsed).to.be.below(5000);
      });
