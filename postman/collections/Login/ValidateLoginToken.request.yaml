    code: >-
      var jsonData = pm.response.json();

      var result = jsonData.ValidateLoginTokenResult;


      pm.environment.set("token",      result.UserToken);

      pm.environment.set("clientId",   result.EnterpriseId || 5);

      pm.environment.set("languageId", result.LanguageID);

      pm.environment.set("userId",     result.UserID);

      pm.environment.set("verticalId", result.VerticalId || 3);


