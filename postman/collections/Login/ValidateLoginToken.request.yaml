      result.EnterpriseId + " userId=" + result.UserID + " languageId=" +
      result.LanguageID + " verticalId=" + result.VerticalId);


      // Chaining to GetEnterpriseSettings

      pm.execution.setNextRequest("02 - GetEnterpriseSettings");
