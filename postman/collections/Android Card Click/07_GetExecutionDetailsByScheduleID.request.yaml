$kind: http-request
name: "07 - GetExecutionDetailsByScheduleID"
url: "{{base_url}}/ProInspectorJson.svc/GetExecutionDetailsByScheduleID?p_AgendamentorID={{scheduleID}}"
method: GET
headers:
  Authorization: "{{token}}"
settings:
  disabledSystemHeaders: []
order: 1772600000007
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_GetExecutionDetails_start", Date.now());
      console.log("[GetExecutionDetailsByScheduleID] Request started at: " + new Date().toISOString());
      console.log("[GetExecutionDetailsByScheduleID] scheduleID: " + pm.environment.get("scheduleID"));
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetExecutionDetails_start"));

      pm.test("GetExecutionDetailsByScheduleID - Status 200", function () {
          pm.response.to.have.status(200);
      });

      var jsonData = pm.response.json();
      var details = jsonData.GetExecutionDetailsByScheduleIDResult || [];
      var imageIds = [];
      var exeDetailIds = [];

      for (var i = 0; i < details.length; i++) {
          var item = details[i];
          // Collect execution detail IDs for Task service ONLY if task count > 0
          if (item.dbID > 0 && item.dbTaskCount > 0) {
              if (exeDetailIds.indexOf(item.dbID) === -1) {
                  exeDetailIds.push(item.dbID);
              }
          }
          // Collect only IDs with images
          if (item.HasImages === true && item.dbID > 0) {
              if (imageIds.indexOf(item.dbID) === -1) {
                  imageIds.push(item.dbID);
              }
          }
      }

      pm.environment.set("checklist_executionDetailIds", JSON.stringify(exeDetailIds));
      if (exeDetailIds.length > 0) {
          pm.environment.set("task_exeId", String(exeDetailIds[0]));
      } else {
          pm.environment.set("task_exeId", "0");
          pm.environment.set("t_GetTaskByListing_ms", "SKIPPED");
      }

      var baseUrl = pm.environment.get("base_url");
      var token   = pm.environment.get("token");
      var pending = imageIds.length;

      pm.environment.set("checklist_hasImages", pending > 0 ? "true" : "false");
      pm.environment.set("checklist_imageIds", JSON.stringify(imageIds));

      if (pending > 0) {
          pm.environment.set("image_exeId", String(imageIds[0]));
          console.log("[GetExecutionDetails] Found " + pending + " items with images. Saved for next request.");
      } else {
          console.log("[GetExecutionDetailsByScheduleID] No images to fetch.");
          pm.environment.set("image_exeId", "0");
          pm.environment.set("t_GetImageData_ms", "SKIPPED");
      }

      // Chaining for Runner
      // When exeDetailIds exist, let natural Runner order go to 08.
      // If 08 is unchecked, Postman will skip it and move to the next enabled request.
      if (exeDetailIds.length === 0) {
          if (imageIds.length > 0) {
              pm.execution.setNextRequest("10 - GetImageData");
          } else {
              pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
          }
      }

      var elapsed = Date.now() - overallStart;
      pm.environment.set("t_GetExecutionDetails_ms", elapsed);
      console.log("[GetExecutionDetailsByScheduleID] Completed in " + (elapsed / 1000).toFixed(2) + " s");
      pm.test("GetExecutionDetailsByScheduleID - Response time < 5000ms", function () {
          var e = Date.now() - overallStart;
          pm.expect(e).to.be.below(5000);
      });
