$kind: http-request
name: "10 - GetImageData"
url: "{{base_url}}/ProInspectorJson.svc/GetImageData?m_intChecklistExeDetailsId={{image_exeId}}"
method: GET
headers:
  Authorization: "{{token}}"
settings:
  disabledSystemHeaders: []
order: 1772600000010
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_GetImageData_start", Date.now());
      console.log("[GetImageData] Request started at: " + new Date().toISOString());
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetImageData_start"));
      var jsonData = pm.response.json();
      var results = jsonData.GetImageDataResult || [];

      console.log("[GetImageData] Detail ID: " + pm.environment.get("image_exeId"));
      console.log("[GetImageData] Found " + results.length + " images in this record.");

      // 1. Download images found in this specific response
      results.forEach(function(img) {
          if (img.dbImagePath && img.dbImagePath.trim() !== "") {
              console.log("[GetImageData] Downloading: " + img.dbImageName + " FROM " + img.dbImagePath);
              pm.sendRequest({
                  url: img.dbImagePath,
                  method: "GET"
              }, function(err, res) {
                  if (err) {
                      console.error("[GetImageData] ERROR downloading " + img.dbImageName + ": " + err);
                  } else {
                      console.log("[GetImageData] SUCCESS: " + img.dbImageName + " (Status: " + res.code + ")");
                  }
              });
          }
      });

      // 2. Queue Management
      var imageIds = [];
      try {
          imageIds = JSON.parse(pm.environment.get("checklist_imageIds") || "[]");
      } catch(e) { imageIds = []; }

      // Remove the ID we just finished
      if (imageIds.length > 0) {
          imageIds.shift();
      }
      pm.environment.set("checklist_imageIds", JSON.stringify(imageIds));
      pm.environment.set("t_GetImageData_ms", Date.now() - overallStart);

      // 3. Iterative Chaining
      if (imageIds.length > 0) {
          // Process next ID by reloading Request 10
          pm.environment.set("image_exeId", String(imageIds[0]));
          console.log("[GetImageData] Moving to next Detail ID: " + imageIds[0]);
          pm.execution.setNextRequest("10 - GetImageData");
      } else {
          // No more IDs, finish flow
          pm.environment.unset("image_exeId");
          console.log("[GetImageData] ALL images for all Detail IDs have been processed.");
          pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
      }

      pm.test("GetImageData - Status 200", function () {
          pm.response.to.have.status(200);
      });
