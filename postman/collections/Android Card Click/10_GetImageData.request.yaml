$kind: http-request
name: "10 - GetImageData"
url: "{{base_url}}/ProInspectorJson.svc/GetImageData?m_intChecklistExeDetailsId={{image_exeId}}"
method: GET
headers:
  Authorization: "{{token}}"
settings:
  disabledSystemHeaders: []
order: 1772600000010
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_GetImageData_start", Date.now());
      console.log("[GetImageData] Parallel async started at: " + new Date().toISOString());
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetImageData_start"));

      var imageIds = [];
      try {
          imageIds = JSON.parse(pm.environment.get("checklist_imageIds") || "[]");
      } catch(e) { imageIds = []; }

      if (imageIds.length === 0) {
          console.log("[GetImageData] No image IDs to process. Skipping.");
          pm.environment.set("t_GetImageData_ms", "SKIPPED");
          pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
          return;
      }

      var baseUrl = pm.environment.get("base_url");
      var token = pm.environment.get("token");

      var completed = 0;
      var total = imageIds.length;

      console.log("[GetImageData] Firing all " + total + " requests in parallel.");

      // Fire all at once — no waiting
      for (var i = 0; i < imageIds.length; i++) {
          (function(exeId) {
              var url = baseUrl + "/ProInspectorJson.svc/GetImageData?m_intChecklistExeDetailsId=" + exeId;

              pm.sendRequest({
                  url: url,
                  method: "GET",
                  header: { "Authorization": token }
              }, function(err, res) {
                  if (err) {
                      console.error("[GetImageData] ERROR for Detail ID=" + exeId + ": " + err);
                  } else {
                      try {
                          var results = res.json().GetImageDataResult || [];
                          console.log("[GetImageData] Detail ID=" + exeId + " => " + results.length + " images.");
                          results.forEach(function(img) {
                              if (img.dbImagePath && img.dbImagePath.trim() !== "") {
                                  console.log("[GetImageData] Downloading: " + img.dbImageName + " FROM " + img.dbImagePath);
                                  pm.sendRequest({ url: img.dbImagePath, method: "GET" }, function(e, r) {
                                      if (e) {
                                          console.error("[GetImageData] ERROR downloading " + img.dbImageName + ": " + e);
                                      } else {
                                          console.log("[GetImageData] SUCCESS: " + img.dbImageName + " (Status: " + r.code + ")");
                                      }
                                  });
                              }
                          });
                      } catch(e) {
                          console.error("[GetImageData] Parse error for Detail ID=" + exeId + ": " + e);
                      }
                  }

                  completed++;
                  if (completed === total) {
                      pm.environment.set("image_exeId", "0");
                      pm.environment.set("t_GetImageData_ms", Date.now() - overallStart);
                      console.log("[GetImageData] All " + total + " parallel calls done.");
                      pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
                  }
              });
          })(imageIds[i]);
      }

      pm.test("GetImageData - Status 200", function () {
          pm.response.to.have.status(200);
      });
