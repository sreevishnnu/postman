$kind: http-request
name: "08 - GetTaskByListingByExecutionDetailsID"
url: "{{base_url}}/ProInspectorJson.svc/GetTaskByListingByExecutionDetailsID?clientId={{clientId}}&userId={{userId}}&businessVerticalsId={{businessVerticalId}}&executionDetailsId={{task_exeId}}&verticalId={{verticalId}}&pageSize=100&pageIndex=0&recordCount=0"
method: GET
headers:
  Authorization: "{{token}}"
queryParams:
  clientId: "{{clientId}}"
  userId: "{{userId}}"
  businessVerticalsId: "{{businessVerticalId}}"
  executionDetailsId: "{{task_exeId}}"
  verticalId: "{{verticalId}}"
  pageSize: "100"
  pageIndex: "0"
  recordCount: "0"
settings:
  disabledSystemHeaders: []
order: 1772600000008
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_GetTaskByListing_start", Date.now());
      console.log("[GetTaskByListing] Parallel async started at: " + new Date().toISOString());
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetTaskByListing_start"));

      var exeIds = [];
      try {
          exeIds = JSON.parse(pm.environment.get("checklist_executionDetailIds") || "[]");
      } catch(e) { exeIds = []; }

      if (exeIds.length === 0) {
          console.log("[GetTaskByListing] No executionDetailIds to process. Skipping.");
          pm.environment.set("t_GetTaskByListing_ms", "SKIPPED");
          pm.environment.set("task_info_taskId", "0");
          pm.environment.set("task_info_exeId", "0");
          pm.environment.set("t_GetTaskInfo_ms", "SKIPPED");
          var imageIds = [];
          try { imageIds = JSON.parse(pm.environment.get("checklist_imageIds") || "[]"); } catch(e) {}
          if (imageIds.length > 0) {
              pm.execution.setNextRequest("10 - GetImageData");
          } else {
              pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
          }
          return;
      }

      var baseUrl = pm.environment.get("base_url");
      var clientId = pm.environment.get("clientId");
      var userId = pm.environment.get("userId");
      var businessVerticalId = pm.environment.get("businessVerticalId");
      var verticalId = pm.environment.get("verticalId");
      var token = pm.environment.get("token");

      var taskPayloads = [];
      var completed = 0;
      var total = exeIds.length;

      console.log("[GetTaskByListing] Firing all " + total + " requests in parallel.");

      // Fire all at once — no waiting
      for (var i = 0; i < exeIds.length; i++) {
          (function(exeId) {
              var url = baseUrl + "/ProInspectorJson.svc/GetTaskByListingByExecutionDetailsID"
                  + "?clientId=" + clientId
                  + "&userId=" + userId
                  + "&businessVerticalsId=" + businessVerticalId
                  + "&executionDetailsId=" + exeId
                  + "&verticalId=" + verticalId
                  + "&pageSize=100&pageIndex=0&recordCount=0";

              pm.sendRequest({
                  url: url,
                  method: "GET",
                  header: { "Authorization": token }
              }, function(err, res) {
                  if (err) {
                      console.error("[GetTaskByListing] ERROR for exeId=" + exeId + ": " + err);
                  } else {
                      try {
                          var resultStr = res.json().GetTaskByListingByExecutionDetailsIDResult;
                          if (resultStr) {
                              var tasks = JSON.parse(resultStr);
                              tasks.forEach(function(t) {
                                  taskPayloads.push({ taskId: t.hdn_TaskId, exeId: exeId });
                              });
                              console.log("[GetTaskByListing] exeId=" + exeId + " => " + tasks.length + " tasks.");
                          }
                      } catch(e) {
                          console.error("[GetTaskByListing] Parse error for exeId=" + exeId + ": " + e);
                      }
                  }

                  completed++;
                  if (completed === total) {
                      pm.environment.set("checklist_taskInfoPayloads", JSON.stringify(taskPayloads));
                      pm.environment.set("t_GetTaskByListing_ms", Date.now() - overallStart);
                      console.log("[GetTaskByListing] All " + total + " parallel calls done. Total tasks: " + taskPayloads.length);

                      if (taskPayloads.length > 0) {
                          pm.environment.set("task_info_taskId", String(taskPayloads[0].taskId));
                          pm.environment.set("task_info_exeId", String(taskPayloads[0].exeId));
                      } else {
                          pm.environment.set("task_info_taskId", "0");
                          pm.environment.set("task_info_exeId", "0");
                          pm.environment.set("t_GetTaskInfo_ms", "SKIPPED");
                      }
                  }
              });
          })(exeIds[i]);
      }

      pm.test("GetTaskByListing - Status 200", function () {
          pm.response.to.have.status(200);
      });
