$kind: http-request
name: "09 - GetTaskInfoByID"
url: "{{base_url}}/TaskManager.svc/GetTaskInfoByID?clientId={{clientId}}&languageId={{languageId}}&verticalId={{verticalId}}&attFamily={{attFamily}}&taskId={{task_info_taskId}}&executionDetailsID={{task_info_exeId}}&businessVerticalId={{businessVerticalId}}&userId={{userId}}&isIPAD=false"
method: GET
headers:
  Authorization: "{{token}}"
queryParams:
  clientId: "{{clientId}}"
  languageId: "{{languageId}}"
  verticalId: "{{verticalId}}"
  attFamily: "{{attFamily}}"
  taskId: "{{task_info_taskId}}"
  executionDetailsID: "{{task_info_exeId}}"
  businessVerticalId: "{{businessVerticalId}}"
  userId: "{{userId}}"
  isIPAD: "false"
settings:
  disabledSystemHeaders: []
order: 1772600000009
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("t_GetTaskInfo_start", Date.now());
      console.log("[GetTaskInfoByID] Request started at: " + new Date().toISOString());
  - type: afterResponse
    language: text/javascript
    code: |-
      var overallStart = parseInt(pm.environment.get("t_GetTaskInfo_start"));

      // Queue management — remove the task we just processed
      var payloads = [];
      try {
          payloads = JSON.parse(pm.environment.get("checklist_taskInfoPayloads") || "[]");
      } catch(e) { payloads = []; }

      if (payloads.length > 0) {
          payloads.shift();
      }
      pm.environment.set("checklist_taskInfoPayloads", JSON.stringify(payloads));
      pm.environment.set("t_GetTaskInfo_ms", Date.now() - overallStart);

      // Iterative chaining
      if (payloads.length > 0) {
          pm.environment.set("task_info_taskId", String(payloads[0].taskId));
          pm.environment.set("task_info_exeId",  String(payloads[0].exeId));
          console.log("[GetTaskInfoByID] Moving to next taskId: " + payloads[0].taskId);
          pm.execution.setNextRequest("09 - GetTaskInfoByID");
      } else {
          // All tasks done — move to images or finish
          var imageIds = [];
          try { imageIds = JSON.parse(pm.environment.get("checklist_imageIds") || "[]"); } catch(e) {}
          if (imageIds.length > 0) {
              console.log("[GetTaskInfoByID] All tasks done. Jumping to Image Data.");
              pm.execution.setNextRequest("10 - GetImageData");
          } else {
              console.log("[GetTaskInfoByID] All tasks done. No images. Jumping to UpdateofflineInspectionStatus.");
              pm.execution.setNextRequest("11 - UpdateofflineInspectionStatus");
          }
      }

      pm.test("GetTaskInfoByID - Status 200", function () {
          pm.response.to.have.status(200);
      });
